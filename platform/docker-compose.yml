# TeacherLM platform stack.
#
# Service hostnames inside the compose network:
#   postgres  redis  qdrant  minio  backend  arq_worker  teacher_gen  quiz_gen
#   mindmap_gen  podcast_gen  frontend
#
# Secrets and overridable credentials live in platform/.env (see .env.example).
# The backend and worker override URLs for the in-network hostnames below so a
# developer's host-side .env (pointing at localhost) still works outside compose.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teacherlm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teacherlm}
      POSTGRES_DB: ${POSTGRES_DB:-teacherlm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teacherlm}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: platform/backend/Dockerfile
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
        PREFETCH_EMBEDDING_MODEL: ${PREFETCH_EMBEDDING_MODEL:-true}
        RETRIEVAL_RERANKER_MODEL: ${RETRIEVAL_RERANKER_MODEL:-BAAI/bge-reranker-base}
        PREFETCH_RERANKER_MODEL: ${PREFETCH_RERANKER_MODEL:-true}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-teacherlm}:${POSTGRES_PASSWORD:-teacherlm}@postgres:5432/${POSTGRES_DB:-teacherlm}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_SECURE: "false"
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    volumes:
      - ../generators_registry.json:/app/generators_registry.json:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy

  arq_worker:
    build:
      context: ..
      dockerfile: platform/backend/Dockerfile
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
        PREFETCH_EMBEDDING_MODEL: ${PREFETCH_EMBEDDING_MODEL:-true}
        RETRIEVAL_RERANKER_MODEL: ${RETRIEVAL_RERANKER_MODEL:-BAAI/bge-reranker-base}
        PREFETCH_RERANKER_MODEL: ${PREFETCH_RERANKER_MODEL:-true}
    restart: unless-stopped
    command: ["arq", "workers.ingestion_worker.WorkerSettings"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-teacherlm}:${POSTGRES_PASSWORD:-teacherlm}@postgres:5432/${POSTGRES_DB:-teacherlm}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy

  teacher_gen:
    build:
      context: ..
      dockerfile: generators/teacher_gen/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TEACHER_GEN_OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      TEACHER_GEN_CHAT_MODEL: ${TEACHER_GEN_CHAT_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}
      TEACHER_GEN_ANALYSIS_MODEL: ${TEACHER_GEN_ANALYSIS_MODEL:-${OLLAMA_ANALYSIS_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}}
      TEACHER_GEN_EXTRACTION_MODEL: ${TEACHER_GEN_EXTRACTION_MODEL:-${OLLAMA_EXTRACTION_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TEACHER_GEN_PORT:-8001}:8001"

  quiz_gen:
    build:
      context: ..
      dockerfile: generators/quiz_gen/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QUIZ_GEN_OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      QUIZ_GEN_CHAT_MODEL: ${QUIZ_GEN_CHAT_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}
      QUIZ_GEN_EXTRACTION_MODEL: ${QUIZ_GEN_EXTRACTION_MODEL:-${OLLAMA_EXTRACTION_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}}
      QUIZ_GEN_GENERATION_MODEL: ${QUIZ_GEN_GENERATION_MODEL:-${OLLAMA_GENERATION_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}}
      QUIZ_GEN_MINIO_ENDPOINT: minio:9000
      QUIZ_GEN_MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      QUIZ_GEN_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      QUIZ_GEN_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      QUIZ_GEN_MINIO_BUCKET: ${MINIO_BUCKET:-teacherlm}
      QUIZ_GEN_MINIO_SECURE: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${QUIZ_GEN_PORT:-8002}:8002"
    depends_on:
      minio:
        condition: service_healthy

  mindmap_gen:
    build:
      context: ..
      dockerfile: generators/mindmap_gen/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_URL: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      MODEL_NAME: ${MINDMAP_GEN_MODEL:-llama3.1:8b-instruct-q4_K_M}
      ARTIFACTS_DIR: /app/generators/mindmap_gen/artifacts
      DEFAULT_SIZE: ${MINDMAP_GEN_DEFAULT_SIZE:-standard}
      MAX_NODES: ${MINDMAP_GEN_MAX_NODES:-60}
      # Origin the browser uses to fetch generated artifacts (.json/.html/.mmd).
      # Compose maps 8008→host so the default works for local dev; override when
      # deploying behind a reverse proxy.
      PUBLIC_BASE_URL: ${MINDMAP_GEN_PUBLIC_URL:-http://localhost:8008}
    volumes:
      - mindmap_artifacts:/app/generators/mindmap_gen/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${MINDMAP_GEN_PORT:-8008}:8008"

  podcast_gen:
    build:
      context: ..
      dockerfile: generators/podcast_gen/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PODCAST_GEN_OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      PODCAST_GEN_CHAT_MODEL: ${PODCAST_GEN_CHAT_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}
      PODCAST_GEN_EXTRACTION_MODEL: ${PODCAST_GEN_EXTRACTION_MODEL:-${OLLAMA_EXTRACTION_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}}
      PODCAST_GEN_GENERATION_MODEL: ${PODCAST_GEN_GENERATION_MODEL:-${OLLAMA_GENERATION_MODEL:-${OLLAMA_CHAT_MODEL:-llama3.1:8b-instruct-q4_K_M}}}
      PODCAST_GEN_MINIO_ENDPOINT: minio:9000
      PODCAST_GEN_MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      PODCAST_GEN_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      PODCAST_GEN_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      PODCAST_GEN_MINIO_BUCKET: ${MINIO_BUCKET:-teacherlm}
      PODCAST_GEN_MINIO_SECURE: "false"
      # Voice IDs from kokoro-onnx's voices-v1.0.bin pack. Override via .env
      # to swap in different voices when the model files are mounted.
      PODCAST_GEN_VOICE_HOST_A: ${PODCAST_GEN_VOICE_HOST_A:-af_heart}
      PODCAST_GEN_VOICE_HOST_B: ${PODCAST_GEN_VOICE_HOST_B:-am_michael}
    volumes:
      # Bind-mount the host's models dir so the same files work for both
      # Docker and non-Docker runs. .dockerignore keeps these out of the
      # build context so image builds stay lean. Without these files the
      # generator falls back to pyttsx3 (single voice, espeak-ng).
      - ../generators/podcast_gen/models:/app/generators/podcast_gen/models
      - podcast_artifacts:/app/generators/podcast_gen/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PODCAST_GEN_PORT:-8007}:8007"
    depends_on:
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined at build time; must be a build-arg, not a runtime env.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  mindmap_artifacts:
  podcast_artifacts:
