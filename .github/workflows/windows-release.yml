name: Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: 0.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      TEACHERLM_OLLAMA_SHA256: ${{ secrets.TEACHERLM_OLLAMA_SHA256 }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: local_teacherlm/apps/desktop/package-lock.json

      - name: Prepare Rust
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable

      - name: Import Windows signing certificate
        if: env.WINDOWS_CERTIFICATE_BASE64 != ''
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          $path = Join-Path $env:RUNNER_TEMP "teacherlm-signing.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "TAURI_WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.version }}" } else { "${{ github.ref_name }}".TrimStart("v") }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\local_teacherlm\packaging\windows\build.ps1 -Version "${{ steps.version.outputs.value }}" -SkipTests

      - uses: actions/upload-artifact@v7
        with:
          name: TeacherLM-Windows-${{ steps.version.outputs.value }}
          path: local_teacherlm/release/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $files = Get-ChildItem local_teacherlm\release\* | ForEach-Object FullName
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber
          } else {
            gh release create $tag $files --generate-notes --title "TeacherLM $tag"
          }
